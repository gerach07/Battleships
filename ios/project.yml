name: Battleships
options:
  bundleIdPrefix: com.abgames
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"

packages:
  SocketIO:
    url: https://github.com/socketio/socket.io-client-swift
    branch: master

targets:
  Battleships:
    type: application
    platform: iOS
    sources:
      - path: Battleships
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.abgames.battleships
        PRODUCT_NAME: Battleships
        MARKETING_VERSION: "2.3.0"
        CURRENT_PROJECT_VERSION: "4"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: Battleships
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: SocketIO
        product: SocketIO
    info:
      path: Battleships/Info.plist
      properties:
        NSAppTransportSecurity:
          NSExceptionDomains:
            battleships-server-jtit.onrender.com:
              NSExceptionAllowsInsecureHTTPLoads: false
              NSIncludesSubdomains: true
        UIBackgroundModes:
          - audio
