<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="waterGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:0.4" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:0.4" />
    </linearGradient>
    <linearGradient id="shipGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#64748b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#334155;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="crosshairGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" ry="80" fill="url(#bgGrad)"/>

  <!-- Grid lines (subtle) -->
  <g stroke="#3b82f6" stroke-opacity="0.15" stroke-width="1">
    <line x1="80" y1="100" x2="80" y2="420"/>
    <line x1="148" y1="100" x2="148" y2="420"/>
    <line x1="216" y1="100" x2="216" y2="420"/>
    <line x1="284" y1="100" x2="284" y2="420"/>
    <line x1="352" y1="100" x2="352" y2="420"/>
    <line x1="420" y1="100" x2="420" y2="420"/>
    <line x1="60" y1="120" x2="440" y2="120"/>
    <line x1="60" y1="188" x2="440" y2="188"/>
    <line x1="60" y1="256" x2="440" y2="256"/>
    <line x1="60" y1="324" x2="440" y2="324"/>
    <line x1="60" y1="392" x2="440" y2="392"/>
  </g>

  <!-- Water waves -->
  <path d="M40 350 Q100 330 160 350 T280 350 T400 350 T480 350" fill="none" stroke="url(#waterGrad)" stroke-width="3" opacity="0.6"/>
  <path d="M40 380 Q100 360 160 380 T280 380 T400 380 T480 380" fill="none" stroke="url(#waterGrad)" stroke-width="2" opacity="0.4"/>
  <path d="M40 410 Q100 390 160 410 T280 410 T400 410 T480 410" fill="none" stroke="url(#waterGrad)" stroke-width="2" opacity="0.3"/>

  <!-- Ship (battleship silhouette) -->
  <g transform="translate(256,280) rotate(-15)">
    <!-- Hull -->
    <path d="M-120,0 L-100,-20 L100,-20 L120,-10 L110,0 Z" fill="url(#shipGrad)" stroke="#475569" stroke-width="2"/>
    <!-- Deck -->
    <rect x="-70" y="-35" width="100" height="15" rx="3" fill="#475569"/>
    <!-- Bridge -->
    <rect x="-20" y="-55" width="40" height="20" rx="4" fill="#64748b" stroke="#94a3b8" stroke-width="1"/>
    <!-- Mast -->
    <line x1="0" y1="-55" x2="0" y2="-80" stroke="#94a3b8" stroke-width="2"/>
    <!-- Cannons -->
    <rect x="-80" y="-28" width="25" height="6" rx="3" fill="#94a3b8"/>
    <rect x="40" y="-28" width="30" height="6" rx="3" fill="#94a3b8"/>
    <!-- Flag -->
    <polygon points="0,-80 20,-72 0,-64" fill="#ef4444" opacity="0.9"/>
  </g>

  <!-- Crosshair / Target -->
  <g filter="url(#glow)" transform="translate(330,160)">
    <circle cx="0" cy="0" r="40" fill="none" stroke="url(#crosshairGrad)" stroke-width="3" opacity="0.9"/>
    <circle cx="0" cy="0" r="25" fill="none" stroke="url(#crosshairGrad)" stroke-width="2" opacity="0.7"/>
    <line x1="-50" y1="0" x2="-15" y2="0" stroke="#ef4444" stroke-width="2.5"/>
    <line x1="15" y1="0" x2="50" y2="0" stroke="#ef4444" stroke-width="2.5"/>
    <line x1="0" y1="-50" x2="0" y2="-15" stroke="#ef4444" stroke-width="2.5"/>
    <line x1="0" y1="15" x2="0" y2="50" stroke="#ef4444" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="4" fill="#ef4444"/>
  </g>

  <!-- Hit markers (explosions) -->
  <g>
    <circle cx="180" cy="190" r="12" fill="#f97316" opacity="0.8"/>
    <circle cx="180" cy="190" r="7" fill="#fbbf24" opacity="0.9"/>
    <circle cx="140" cy="230" r="10" fill="#f97316" opacity="0.6"/>
    <circle cx="140" cy="230" r="5" fill="#fbbf24" opacity="0.8"/>
  </g>

  <!-- Miss markers -->
  <circle cx="380" cy="300" r="8" fill="none" stroke="#60a5fa" stroke-width="2" opacity="0.5"/>
  <circle cx="120" cy="320" r="8" fill="none" stroke="#60a5fa" stroke-width="2" opacity="0.5"/>

  <!-- Title text "AB" -->
  <text x="256" y="470" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="48" fill="white" opacity="0.95" letter-spacing="6">AB</text>
</svg>
